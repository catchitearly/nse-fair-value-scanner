name: NSE Fair Value Scanner

on:
  workflow_dispatch:
    inputs:

      scan_date:
        description: |
          📅 SCAN DATE — backtest date (YYYY-MM-DD).
          Leave BLANK for today's live data.
          ⚠️  AVOID grey zones: Oct 1-14 | Jan 1-14 | Apr 1-14 | Jul 1-14
          ✅  SAFE dates: Nov 15-Dec 31 | Feb 15-Mar 31 | May 15-Jun 30 | Aug 15-Sep 30
        required: false
        default: ""

      workers:
        description: |
          ⚡ WORKERS — parallel fetch threads.
          1 = sequential, safest
          2 = ~2x faster (default)
          4 = ~4x faster (recommended max)
          8 = fastest, risk of yfinance rate-limit
        required: false
        default: "2"

      csv_file:
        description: |
          📄 CSV FILE — path to your stock universe CSV in the repo.
          Default: stocks.csv (repo root)
          Must have a 'ticker' column. Optional: name, notes, sector.
          Example: data/my_watchlist.csv
        required: false
        default: "stocks.csv"

      limit:
        description: |
          🔢 LIMIT — scan only first N rows of the CSV (for quick tests).
          Leave BLANK to scan all stocks in the CSV.
          Example: 10
        required: false
        default: ""

      delay:
        description: |
          ⏱ DELAY — seconds between API calls (default 0.5).
          Lower to 0.2 when using workers >= 4.
        required: false
        default: "0.5"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📁 Create directories
        run: mkdir -p output logs

      - name: 📋 Show stock universe
        run: |
          CSV="${{ github.event.inputs.csv_file || 'stocks.csv' }}"
          echo "Stock universe: $CSV"
          if [ -f "$CSV" ]; then
            echo "Total stocks: $(tail -n +2 $CSV | wc -l)"
            echo "First 5 tickers:"
            head -6 "$CSV"
          else
            echo "ERROR: $CSV not found in repo!"
            exit 1
          fi

      - name: 🔍 Run NSE Fair Value Scanner
        run: |
          CMD="python scanner.py"
          CMD="$CMD --csv ${{ github.event.inputs.csv_file || 'stocks.csv' }}"

          if [ -n "${{ github.event.inputs.scan_date }}" ]; then
            CMD="$CMD --scan-date ${{ github.event.inputs.scan_date }}"
          fi

          CMD="$CMD --workers ${{ github.event.inputs.workers || '2' }}"
          CMD="$CMD --delay ${{ github.event.inputs.delay || '0.5' }}"

          if [ -n "${{ github.event.inputs.limit }}" ]; then
            CMD="$CMD --limit ${{ github.event.inputs.limit }}"
          fi

          CMD="$CMD --output output"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Running: $CMD"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          eval $CMD

      - name: 📊 Upload Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: nse-fair-value-report-${{ github.run_number }}
          path: output/nse_fair_value_*.xlsx
          retention-days: 60

      - name: 📋 Upload Scan Log
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_number }}
          path: logs/*.log
          retention-days: 14

      - name: ✅ Summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  SCAN COMPLETE"
          if [ -n "${{ github.event.inputs.scan_date }}" ]; then
            echo "  Mode    : BACKTEST  (${{ github.event.inputs.scan_date }})"
          else
            echo "  Mode    : LIVE (today)"
          fi
          echo "  CSV     : ${{ github.event.inputs.csv_file || 'stocks.csv' }}"
          echo "  Workers : ${{ github.event.inputs.workers || '2' }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ls -lh output/
