name: NSE Fair Value Scanner

on:
  workflow_dispatch:
    inputs:

      scan_date:
        description: |
          📅 SCAN DATE — backtest date (YYYY-MM-DD).
          Leave BLANK for today's live data.
          AVOID grey zones: Oct 1-14, Jan 1-14, Apr 1-14, Jul 1-14
          (quarterly results still filing — mixed financial data)
          Safe dates: Nov 15-Dec 31 | Feb 15-Mar 31 | May 15-Jun 30 | Aug 15-Sep 30
        required: false
        default: ""

      workers:
        description: |
          ⚡ WORKERS — parallel fetch threads (faster scan).
          1 = sequential, safest (default)
          2 = ~2x faster
          4 = ~4x faster (recommended max)
          8 = fastest, risk of yfinance rate-limit
        required: false
        default: "2"

      marketcap_min:
        description: |
          📉 MARKET CAP MIN — minimum in Rs Crore (default 500).
          Examples: 100 | 500 | 1000 | 5000
        required: false
        default: "500"

      marketcap_max:
        description: |
          📈 MARKET CAP MAX — maximum in Rs Crore (default 10000).
          Examples: 2000 | 7000 | 10000 | 50000
        required: false
        default: "10000"

      tickers:
        description: |
          🎯 SPECIFIC TICKERS — space-separated (no .NS suffix).
          Leave BLANK to scan all NSE stocks in the market-cap range.
          Example: INFY TCS HCLTECH WIPRO PERSISTENT
        required: false
        default: ""

      limit:
        description: |
          🔢 LIMIT — scan only first N tickers (for quick tests).
          Leave BLANK for full scan. Try 50 for your first test run.
        required: false
        default: ""

      delay:
        description: |
          ⏱ DELAY — seconds between API calls (default 0.5).
          Reduce to 0.2 when using workers >= 4.
        required: false
        default: "0.5"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📁 Create directories
        run: mkdir -p output logs

      - name: 🔍 Run NSE Fair Value Scanner
        run: |
          CMD="python scanner.py"

          if [ -n "${{ github.event.inputs.scan_date }}" ]; then
            CMD="$CMD --scan-date ${{ github.event.inputs.scan_date }}"
          fi

          CMD="$CMD --workers ${{ github.event.inputs.workers || '2' }}"
          CMD="$CMD --mcap-min ${{ github.event.inputs.marketcap_min || '500' }}"
          CMD="$CMD --mcap-max ${{ github.event.inputs.marketcap_max || '10000' }}"
          CMD="$CMD --delay ${{ github.event.inputs.delay || '0.5' }}"

          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            CMD="$CMD --tickers ${{ github.event.inputs.tickers }}"
          fi

          if [ -n "${{ github.event.inputs.limit }}" ]; then
            CMD="$CMD --limit ${{ github.event.inputs.limit }}"
          fi

          CMD="$CMD --output output"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Running: $CMD"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          eval $CMD

      - name: 📊 Upload Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: nse-fair-value-report-${{ github.run_number }}
          path: output/nse_fair_value_*.xlsx
          retention-days: 60

      - name: 📋 Upload Scan Log
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_number }}
          path: logs/*.log
          retention-days: 14

      - name: ✅ Summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  SCAN COMPLETE"
          if [ -n "${{ github.event.inputs.scan_date }}" ]; then
            echo "  Mode    : BACKTEST  (${{ github.event.inputs.scan_date }})"
          else
            echo "  Mode    : LIVE (today)"
          fi
          echo "  MCap    : Rs ${{ github.event.inputs.marketcap_min || '500' }} cr  to  Rs ${{ github.event.inputs.marketcap_max || '10000' }} cr"
          echo "  Workers : ${{ github.event.inputs.workers || '2' }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  Download the Excel report from Artifacts above."
          ls -lh output/
