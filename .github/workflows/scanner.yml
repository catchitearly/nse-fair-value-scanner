name: NSE Fair Value Scanner

on:
  workflow_dispatch:
    inputs:

      scan_date:
        description: |
          📅 SCAN DATE — backtest date (YYYY-MM-DD).
          Leave BLANK for today's live data.
          ⚠️  AVOID grey zones: Oct 1-14 | Jan 1-14 | Apr 1-14 | Jul 1-14
          ✅  SAFE dates: Nov15-Dec31 | Feb15-Mar31 | May15-Jun30 | Aug15-Sep30
        required: false
        default: ""

      workers:
        description: |
          ⚡ WORKERS — parallel fetch threads.
          1 = sequential, safest (default)
          2 = ~2x faster
          4 = ~4x faster (recommended max)
        required: false
        default: "1"

      csv_file:
        description: |
          📄 CSV FILE — path to your stock list in the repo.
          Default: stocks.csv (must have: Stock Name | Symbol columns)
        required: false
        default: "stocks.csv"

      limit:
        description: |
          🔢 LIMIT — scan only first N rows (for quick tests).
          Leave BLANK for full scan. Use 5 for your first test run.
        required: false
        default: ""

      delay:
        description: |
          ⏱ DELAY — seconds between API calls (default 1.5).
          Increase to 3.0 if you get rate-limit errors.
        required: false
        default: "1.5"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          # curl_cffi enables Chrome TLS impersonation to bypass Yahoo Finance
          # bot-detection that blocks GitHub Actions IP ranges
          pip install "curl_cffi>=0.7.0"
          echo "curl_cffi version: $(python3 -c 'import curl_cffi; print(curl_cffi.__version__)')"

      - name: 📁 Create directories
        run: mkdir -p output logs

      - name: 📋 Show stock universe
        run: |
          CSV="${{ github.event.inputs.csv_file || 'stocks.csv' }}"
          if [ -f "$CSV" ]; then
            echo "✅ Found: $CSV"
            echo "Total rows: $(tail -n +2 "$CSV" | wc -l)"
            echo "--- First 5 rows ---"
            head -6 "$CSV"
          else
            echo "❌ ERROR: $CSV not found in repo!"
            exit 1
          fi

      - name: 🔌 Connectivity diagnostic
        run: |
          python3 - << 'EOF'
          import yfinance as yf, sys, time

          # Enable Chrome impersonation before any requests
          try:
              from curl_cffi import requests as cffi_requests
              session = cffi_requests.Session(impersonate="chrome")
              import yfinance.utils as yf_utils
              yf_utils.requests = cffi_requests
              print("✅ curl_cffi Chrome impersonation active")
          except Exception as e:
              print(f"⚠️  curl_cffi setup: {e}")

          print(f"yfinance version: {yf.__version__}")
          print("Testing connectivity on 3 tickers ...")

          ok = 0
          for t in ["INFY.NS", "TCS.NS", "RELIANCE.NS"]:
              try:
                  tk = yf.Ticker(t)
                  # Try fast_info first
                  price = None
                  try:
                      fi = tk.fast_info
                      price = getattr(fi, "last_price", None)
                      if price: price = float(price)
                  except Exception:
                      pass

                  # Fallback to history
                  if not price or price <= 0:
                      hist = tk.history(period="3d", auto_adjust=True)
                      if not hist.empty:
                          price = float(hist["Close"].iloc[-1])

                  if price and price > 0:
                      print(f"  ✅ {t}: {price:.2f}")
                      ok += 1
                  else:
                      print(f"  ⚠️  {t}: returned no price data")

                  time.sleep(1.0)

              except Exception as e:
                  print(f"  ❌ {t}: {e}")
                  time.sleep(2.0)

          print()
          if ok > 0:
              print(f"✅ Connectivity OK — {ok}/3 tickers responded. Proceeding with scan.")
          else:
              print("❌ WARNING: All test tickers failed.")
              print("   This likely means GitHub Actions IP is temporarily rate-limited.")
              print("   Options:")
              print("   1. Wait 5-10 minutes and re-run this workflow")
              print("   2. Increase delay to 3.0+ in workflow inputs")
              print("   Continuing anyway — the main scan has per-stock retry logic.")
          EOF

      - name: 🔍 Run NSE Fair Value Scanner
        run: |
          CMD="python scanner.py"
          CMD="$CMD --csv ${{ github.event.inputs.csv_file || 'stocks.csv' }}"

          if [ -n "${{ github.event.inputs.scan_date }}" ]; then
            CMD="$CMD --scan-date ${{ github.event.inputs.scan_date }}"
          fi

          CMD="$CMD --workers ${{ github.event.inputs.workers || '1' }}"
          CMD="$CMD --delay ${{ github.event.inputs.delay || '1.5' }}"

          if [ -n "${{ github.event.inputs.limit }}" ]; then
            CMD="$CMD --limit ${{ github.event.inputs.limit }}"
          fi

          CMD="$CMD --output output"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Running: $CMD"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          eval $CMD

      - name: 📊 Upload Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nse-fair-value-report-${{ github.run_number }}
          path: output/nse_fair_value_*.xlsx
          retention-days: 60
          if-no-files-found: warn

      - name: 📋 Upload Scan Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_number }}
          path: logs/*.log
          retention-days: 14
          if-no-files-found: warn

      - name: ✅ Summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -n "${{ github.event.inputs.scan_date }}" ]; then
            echo "Mode    : BACKTEST (${{ github.event.inputs.scan_date }})"
          else
            echo "Mode    : LIVE"
          fi
          echo "CSV     : ${{ github.event.inputs.csv_file || 'stocks.csv' }}"
          echo "Workers : ${{ github.event.inputs.workers || '1' }}"
          echo "Delay   : ${{ github.event.inputs.delay || '1.5' }}s"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ls -lh output/ 2>/dev/null || echo "No output files"
